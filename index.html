<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Research guiado para validar oportunidades ecommerce y auditar tiendas Shopify."
    />
    <title>Ecom Research Agent</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="radar"></i>
          </div>
          <div>
            <h1>Ecom Research</h1>
            <p>Shopify + Meta Ads + Amazon + TikTok</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="copySummary" type="button" title="Copiar resumen">
            <i data-lucide="copy"></i>
          </button>
          <button class="icon-button" id="downloadBrief" type="button" title="Descargar brief">
            <i data-lucide="download"></i>
          </button>
        </div>
      </header>

      <main class="workspace">
        <form class="control-panel" id="researchForm">
          <div class="panel-heading">
            <span class="eyebrow">Nuevo research</span>
            <h2>Escoge el camino ecom</h2>
          </div>

          <fieldset>
            <legend>Camino</legend>
            <div class="path-selector" role="radiogroup" aria-label="Camino ecommerce">
              <label>
                <input type="radio" name="businessStage" value="starter" checked />
                <span>
                  <i data-lucide="compass"></i>
                  <strong>Empezar desde cero</strong>
                  <small>Research, idea, avatar y primeros pasos</small>
                </span>
              </label>
              <label>
                <input type="radio" name="businessStage" value="shopify" />
                <span>
                  <i data-lucide="shopping-bag"></i>
                  <strong>Tienda / Shopify</strong>
                  <small>Auditoria, catalogo y acciones para vender</small>
                </span>
              </label>
            </div>
          </fieldset>

          <label>
            Marca o URL de referencia
            <input
              id="reference"
              name="reference"
              type="text"
              placeholder="Marca, URL de competidor o tienda Shopify"
              autocomplete="off"
            />
          </label>

          <label>
            Problema o producto
            <textarea
              id="problem"
              name="problem"
              rows="4"
              placeholder="Quiero vender online pero no se que producto elegir"
            ></textarea>
          </label>

          <div class="shopify-fields" id="shopifyFields" hidden>
            <div class="shopify-connect-card">
              <label>
                Dominio Shopify
                <input
                  id="shopifyDomain"
                  name="shopifyDomain"
                  type="text"
                  placeholder="mi-tienda.myshopify.com"
                  autocomplete="off"
                />
              </label>
              <button class="secondary-button" id="connectShopify" type="button">
                <i data-lucide="plug"></i>
                Conectar tienda
              </button>
            </div>
            <label>
              Tienda conectada
              <select id="shopifyStore" name="shopifyStore">
                <option value="">Sin tiendas conectadas</option>
              </select>
            </label>
            <div class="shopify-actions">
              <button class="utility-button" id="refreshShopifyStores" type="button">
                <i data-lucide="refresh-cw"></i>
                Actualizar
              </button>
              <button class="utility-button danger" id="disconnectShopify" type="button">
                <i data-lucide="unlink"></i>
                Desconectar
              </button>
            </div>
            <p class="field-note" id="shopifyConnectionStatus">
              Conecta cada tienda una vez con OAuth de Shopify.
            </p>
            <label>
              Foco de la tienda
              <input
                id="shopifyFocus"
                name="shopifyFocus"
                type="text"
                placeholder="Conversion, catalogo o producto ganador"
                autocomplete="off"
              />
            </label>
          </div>

          <div class="field-grid">
            <label>
              Mercado
              <select id="market" name="market">
                <option value="US">Estados Unidos</option>
                <option value="MX">Mexico</option>
                <option value="LATAM">Latam</option>
                <option value="GLOBAL">Global</option>
              </select>
            </label>
            <label>
              Idioma
              <select id="language" name="language">
                <option value="es">Espanol</option>
                <option value="en">English</option>
                <option value="both">Bilingue</option>
              </select>
            </label>
          </div>

          <label>
            Clave de acceso
            <input
              id="accessKey"
              name="accessKey"
              type="password"
              placeholder="Solo si el backend la pide"
              autocomplete="current-password"
            />
          </label>

          <fieldset>
            <legend>Fuentes</legend>
            <div class="source-switches">
              <label class="switch-card">
                <input type="checkbox" name="source" value="meta" checked />
                <span><i data-lucide="megaphone"></i>Meta Ads</span>
              </label>
              <label class="switch-card">
                <input type="checkbox" name="source" value="amazon" checked />
                <span><i data-lucide="star"></i>Amazon</span>
              </label>
              <label class="switch-card">
                <input type="checkbox" name="source" value="tiktok" checked />
                <span><i data-lucide="message-circle"></i>TikTok</span>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Profundidad</legend>
            <div class="segmented" role="radiogroup" aria-label="Profundidad">
              <label>
                <input type="radio" name="depth" value="rapido" checked />
                <span>Rapido</span>
              </label>
              <label>
                <input type="radio" name="depth" value="profundo" />
                <span>Profundo</span>
              </label>
            </div>
          </fieldset>

          <button class="primary-button" type="submit">
            <i data-lucide="sparkles"></i>
            Generar research
          </button>
        </form>

        <section class="result-panel" aria-live="polite">
          <nav class="tabs" aria-label="Secciones del reporte">
            <button class="tab active" type="button" data-tab="brief">Brief</button>
            <button class="tab" type="button" data-tab="sources">Fuentes</button>
            <button class="tab" type="button" data-tab="hooks">Hooks</button>
            <button class="tab" type="button" data-tab="product">Producto</button>
            <button class="tab" type="button" data-tab="shopify">Shopify</button>
          </nav>

          <div class="report active" id="brief" data-panel="brief"></div>
          <div class="report" id="sources" data-panel="sources"></div>
          <div class="report" id="hooks" data-panel="hooks"></div>
          <div class="report" id="product" data-panel="product"></div>
          <div class="report" id="shopify" data-panel="shopify"></div>
        </section>
      </main>
    </div>

    <template id="emptyState">
      <div class="empty-state">
        <div class="source-strip" aria-hidden="true">
          <span><i data-lucide="compass"></i> Starter</span>
          <span><i data-lucide="shopping-bag"></i> Shopify</span>
          <span><i data-lucide="megaphone"></i> Ads</span>
          <span><i data-lucide="star"></i> Reviews</span>
          <span><i data-lucide="message-circle"></i> Social</span>
        </div>
        <h2>Empieza con una idea, problema o tienda.</h2>
        <p>
          Elige research para principiantes o auditoria conectada a Shopify.
        </p>
      </div>
    </template>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
