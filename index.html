<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Agent Genia convierte una solicitud natural de ecommerce en research, sourcing, negociacion y siguientes pasos."
    />
    <title>Agent Genia Research</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css?v=20260628-tools" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Agent Genia">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="wand-sparkles"></i>
          </div>
          <div>
            <h1>Agent Genia</h1>
            <p>Research ecom</p>
          </div>
        </a>
        <div class="top-actions">
          <div class="user-pill" id="userPill" hidden></div>
          <button class="icon-button" id="copySummary" type="button" title="Copiar resumen">
            <i data-lucide="copy"></i>
          </button>
          <button class="icon-button" id="downloadBrief" type="button" title="Descargar brief">
            <i data-lucide="download"></i>
          </button>
        </div>
      </header>

      <main class="main-page">
        <section class="hero">
          <h2>¿Qué quieres investigar hoy?</h2>

          <form class="command-panel" id="researchForm">
            <input id="accessKey" name="accessKey" type="hidden" />
            <div class="stage-inputs" aria-hidden="true">
              <input type="radio" name="businessStage" value="starter" checked tabindex="-1" />
              <input type="radio" name="businessStage" value="brand" tabindex="-1" />
              <input type="radio" name="businessStage" value="shopify" tabindex="-1" />
            </div>
            <div class="prompt-row">
              <div class="tool-menu-wrap">
                <button
                  class="plus-button"
                  id="toolMenuToggle"
                  type="button"
                  title="Agregar contexto"
                  aria-expanded="false"
                  aria-controls="toolMenu"
                >
                  <i data-lucide="plus"></i>
                </button>
                <div class="tool-menu" id="toolMenu" role="menu" hidden>
                  <button class="tool-option" type="button" role="menuitem" data-tool-option="brand">
                    <span class="tool-option-icon brand-tool"><i data-lucide="store"></i></span>
                    <span>Analizar marca</span>
                    <i class="tool-option-check" data-lucide="check"></i>
                  </button>
                  <button class="tool-option" type="button" role="menuitem" data-tool-option="shopify">
                    <span class="tool-option-icon shopify-tool"><i data-lucide="shopping-bag"></i></span>
                    <span>Conectar Shopify</span>
                    <i class="tool-option-check" data-lucide="check"></i>
                  </button>
                  <button class="tool-option quiet" type="button" role="menuitem" data-tool-option="starter" hidden>
                    <span class="tool-option-icon"><i data-lucide="x"></i></span>
                    <span>Quitar contexto</span>
                  </button>
                </div>
              </div>
              <textarea
                id="naturalRequest"
                name="naturalRequest"
                rows="1"
                placeholder="Pide research, producto o proveedor..."
                autocomplete="off"
              ></textarea>
              <button class="active-context-chip" id="activeContextChip" type="button" hidden></button>
              <div class="input-actions">
                <button class="mic-button" type="button" title="Dictar">
                  <i data-lucide="mic"></i>
                </button>
                <button class="send-button" type="submit" title="Ejecutar agente">
                  <i data-lucide="arrow-up"></i>
                </button>
              </div>
            </div>
          </form>

          <div class="context-store" id="brandFields" hidden aria-hidden="true">
            <input id="brandName" name="brandName" type="hidden" />
            <input id="brandUrl" name="brandUrl" type="hidden" />
            <input id="brandChannels" name="brandChannels" type="hidden" />
            <input id="brandGoal" name="brandGoal" type="hidden" />
          </div>

          <div class="context-store" id="shopifyFields" hidden aria-hidden="true">
            <input id="shopifyDomain" name="shopifyDomain" type="hidden" />
            <input id="shopifyFocus" name="shopifyFocus" type="hidden" />
            <select id="shopifyStore" name="shopifyStore" tabindex="-1">
              <option value="">Sin tiendas conectadas</option>
            </select>
            <p id="shopifyConnectionStatus" hidden></p>
          </div>
        </section>

        <section class="auth-page" id="authPage" hidden>
          <div class="auth-panel">
            <a class="auth-brand" href="/" aria-label="Agent Genia">
              <span class="brand-mark" aria-hidden="true">
                <i data-lucide="wand-sparkles"></i>
              </span>
              <span>Agent Genia</span>
            </a>

            <div class="auth-copy">
              <h2>Crea tu cuenta</h2>
              <p id="authSubtitle">Inicia sesión para ejecutar el agente.</p>
              <p class="auth-error" id="authError" hidden></p>
            </div>

            <div class="auth-actions">
              <a class="auth-provider" id="googleLogin" href="/api/auth/google/start">
                <span class="provider-mark google-mark">G</span>
                <span>Continuar con Google</span>
              </a>

              <form class="shopify-login" id="shopifyLoginForm">
                <label for="shopDomain">Tienda Shopify</label>
                <div class="shopify-row">
                  <input
                    id="shopDomain"
                    name="shop"
                    type="text"
                    inputmode="url"
                    placeholder="tu-tienda.myshopify.com"
                    autocomplete="organization"
                  />
                  <button type="submit">Continuar</button>
                </div>
              </form>
            </div>

            <a class="back-link" href="/">Volver</a>
          </div>

          <div class="auth-visual" aria-hidden="true">
            <div class="auth-prompt-preview">
              <span>Quiero validar una marca de skincare</span>
              <i data-lucide="arrow-up"></i>
            </div>
          </div>
        </section>

        <section class="result-panel" aria-live="polite" hidden>
          <nav class="tabs" aria-label="Secciones del reporte">
            <button class="tab active" type="button" data-tab="brief">Resumen</button>
            <button class="tab" type="button" data-tab="tools">Herramientas</button>
            <button class="tab" type="button" data-tab="suppliers">Proveedores</button>
            <button class="tab" type="button" data-tab="negotiation">Negociacion</button>
            <button class="tab" type="button" data-tab="ddp">DDP</button>
            <button class="tab" type="button" data-tab="quality">Calidad</button>
          </nav>

          <div class="report active" id="brief" data-panel="brief"></div>
          <div class="report" id="tools" data-panel="tools"></div>
          <div class="report" id="suppliers" data-panel="suppliers"></div>
          <div class="report" id="negotiation" data-panel="negotiation"></div>
          <div class="report" id="ddp" data-panel="ddp"></div>
          <div class="report" id="quality" data-panel="quality"></div>
        </section>
      </main>
    </div>

    <template id="emptyState">
      <div class="empty-state">
        <div class="source-strip" aria-hidden="true">
          <span><i data-lucide="megaphone"></i> Ads</span>
          <span><i data-lucide="star"></i> Reviews</span>
          <span><i data-lucide="message-circle"></i> Social</span>
          <span><i data-lucide="package-search"></i> Alibaba</span>
        </div>
        <h2>La caja principal controla todo.</h2>
        <p>
          Si pides proveedores, el agente llama sourcing de Alibaba como herramienta interna.
        </p>
      </div>
    </template>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js?v=20260628-tools"></script>
  </body>
</html>
