<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Agent Genia convierte una solicitud natural de ecommerce en research, sourcing, negociacion y siguientes pasos."
    />
    <title>Agent Genia Research</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Agent Genia">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="wand-sparkles"></i>
          </div>
          <div>
            <h1>Agent Genia</h1>
            <p>Research ecom</p>
          </div>
        </a>
        <div class="top-actions">
          <button class="icon-button auth-only" id="toggleHistory" type="button" title="Historial">
            <i data-lucide="history"></i>
          </button>
          <button class="icon-button" id="copySummary" type="button" title="Copiar resumen">
            <i data-lucide="copy"></i>
          </button>
          <button class="icon-button" id="downloadBrief" type="button" title="Descargar brief">
            <i data-lucide="download"></i>
          </button>
          <button class="icon-button auth-only" id="signOut" type="button" title="Salir">
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </header>

      <section class="auth-gate" id="authGate" hidden>
        <form class="auth-card" id="signInForm">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="wand-sparkles"></i>
          </div>
          <h2>Entra a Agent Genia</h2>
          <p>Acceso privado para guardar research, archivos y proveedores.</p>
          <label>
            Email
            <input id="authEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="authPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">
            <i data-lucide="log-in"></i>
            Entrar
          </button>
          <p class="auth-status" id="authStatus" role="status"></p>
        </form>
      </section>

      <main class="main-page">
        <section class="hero">
          <h2>¿Qué quieres investigar hoy?</h2>

          <form class="command-panel" id="researchForm">
            <input id="accessKey" name="accessKey" type="hidden" />
            <input
              id="attachmentInput"
              name="attachments"
              type="file"
              accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx,.xls,.json"
              multiple
              hidden
            />
            <div class="prompt-row">
              <button class="plus-button" type="button" title="Subir archivo o imagen" aria-label="Subir archivo o imagen">
                <i data-lucide="plus"></i>
              </button>
              <textarea
                id="naturalRequest"
                name="naturalRequest"
                rows="1"
                placeholder="Pide research, producto o proveedor..."
                autocomplete="off"
              ></textarea>
              <div class="input-actions">
                <button class="mic-button" type="button" title="Dictar">
                  <i data-lucide="mic"></i>
                </button>
                <button class="send-button" type="submit" title="Ejecutar agente">
                  <i data-lucide="arrow-up"></i>
                </button>
              </div>
            </div>
            <div class="attachment-tray" id="attachmentTray" aria-live="polite" hidden></div>
          </form>
        </section>

        <section class="result-panel" aria-live="polite" hidden>
          <nav class="tabs" aria-label="Secciones del reporte">
            <button class="tab active" type="button" data-tab="brief">Resumen</button>
            <button class="tab" type="button" data-tab="tools">Herramientas</button>
            <button class="tab" type="button" data-tab="suppliers">Proveedores</button>
            <button class="tab" type="button" data-tab="negotiation">Negociacion</button>
            <button class="tab" type="button" data-tab="ddp">DDP</button>
            <button class="tab" type="button" data-tab="quality">Calidad</button>
          </nav>

          <div class="report active" id="brief" data-panel="brief"></div>
          <div class="report" id="tools" data-panel="tools"></div>
          <div class="report" id="suppliers" data-panel="suppliers"></div>
          <div class="report" id="negotiation" data-panel="negotiation"></div>
          <div class="report" id="ddp" data-panel="ddp"></div>
          <div class="report" id="quality" data-panel="quality"></div>
        </section>
      </main>

      <aside class="history-drawer" id="historyDrawer" hidden>
        <div class="history-head">
          <h2>Historial</h2>
          <button class="icon-button" id="closeHistory" type="button" title="Cerrar historial">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="history-list" id="historyList"></div>
      </aside>
    </div>

    <template id="emptyState">
      <div class="empty-state">
        <div class="source-strip" aria-hidden="true">
          <span><i data-lucide="megaphone"></i> Ads</span>
          <span><i data-lucide="star"></i> Reviews</span>
          <span><i data-lucide="message-circle"></i> Social</span>
          <span><i data-lucide="package-search"></i> Alibaba</span>
        </div>
        <h2>La caja principal controla todo.</h2>
        <p>
          Si pides proveedores, el agente llama sourcing de Alibaba como herramienta interna.
        </p>
      </div>
    </template>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
