<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Agent Genia convierte una solicitud natural de ecommerce en research, sourcing, negociacion y siguientes pasos."
    />
    <title>Agent Genia Research</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Agent Genia">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="wand-sparkles"></i>
          </div>
          <div>
            <h1>Agent Genia</h1>
            <p>Research ecom</p>
          </div>
        </a>
        <div class="top-actions">
          <button class="icon-button" id="copySummary" type="button" title="Copiar resumen">
            <i data-lucide="copy"></i>
          </button>
          <button class="icon-button" id="downloadBrief" type="button" title="Descargar brief">
            <i data-lucide="download"></i>
          </button>
        </div>
      </header>

      <main class="main-page">
        <section class="hero">
          <h2>¿Qué quieres investigar hoy?</h2>

          <form class="command-panel" id="researchForm">
            <input id="accessKey" name="accessKey" type="hidden" />
            <div class="stage-inputs" aria-hidden="true">
              <input type="radio" name="businessStage" value="starter" checked tabindex="-1" />
              <input type="radio" name="businessStage" value="shopify" tabindex="-1" />
            </div>
            <div class="prompt-row">
              <button class="plus-button" type="button" title="Agregar contexto">
                <i data-lucide="plus"></i>
              </button>
              <textarea
                id="naturalRequest"
                name="naturalRequest"
                rows="1"
                placeholder="Pide research, producto o proveedor..."
                autocomplete="off"
              ></textarea>
              <div class="input-actions">
                <button class="mic-button" type="button" title="Dictar">
                  <i data-lucide="mic"></i>
                </button>
                <button class="send-button" type="submit" title="Ejecutar agente">
                  <i data-lucide="arrow-up"></i>
                </button>
              </div>
            </div>
          </form>

          <div class="connector-dock" aria-label="Opciones ecommerce">
            <div class="connector-cards" role="radiogroup" aria-label="Camino ecommerce">
              <button class="connector-card" type="button" data-stage-card="shopify" aria-pressed="false">
                <span class="connector-icon shopify-icon"><i data-lucide="shopping-bag"></i></span>
                <span class="connector-label">Conectar Shopify</span>
                <span class="connector-check"><i data-lucide="check"></i></span>
              </button>
            </div>
          </div>

          <div class="shopify-panel" id="shopifyFields" hidden>
            <div class="shopify-panel-head">
              <div>
                <strong>Shopify</strong>
                <small>Conexión OAuth segura</small>
              </div>
              <button class="panel-close" id="closeShopifyPanel" type="button" title="Cerrar Shopify">
                <i data-lucide="x"></i>
              </button>
            </div>
            <div class="shopify-login-row">
              <button class="shopify-login-button" id="loginShopify" type="button">
                <i data-lucide="log-in"></i>
                Iniciar sesión con Shopify
              </button>
            </div>
            <details class="manual-shopify">
              <summary>Usar dominio manual</summary>
              <div class="shopify-connect-row">
                <label>
                  Dominio Shopify
                  <input
                    id="shopifyDomain"
                    name="shopifyDomain"
                    type="text"
                    placeholder="mi-tienda.myshopify.com"
                    autocomplete="off"
                  />
                </label>
                <button class="secondary-button" id="connectShopify" type="button">
                  <i data-lucide="plug"></i>
                  Conectar
                </button>
              </div>
            </details>
            <div class="shopify-store-row">
              <label>
                Tienda conectada
                <select id="shopifyStore" name="shopifyStore">
                  <option value="">Sin tiendas conectadas</option>
                </select>
              </label>
              <button class="utility-button" id="refreshShopifyStores" type="button" title="Actualizar tiendas">
                <i data-lucide="refresh-cw"></i>
              </button>
              <button class="utility-button danger" id="disconnectShopify" type="button" title="Desconectar tienda">
                <i data-lucide="unlink"></i>
              </button>
            </div>
            <p class="field-note" id="shopifyConnectionStatus">
              Conecta cada tienda una vez con OAuth de Shopify.
            </p>
            <label>
              Foco de auditoria
              <input
                id="shopifyFocus"
                name="shopifyFocus"
                type="text"
                placeholder="conversion, catalogo, producto ganador o pricing"
                autocomplete="off"
              />
            </label>
          </div>
        </section>

        <section class="result-panel" aria-live="polite" hidden>
          <nav class="tabs" aria-label="Secciones del reporte">
            <button class="tab active" type="button" data-tab="brief">Resumen</button>
            <button class="tab" type="button" data-tab="tools">Herramientas</button>
            <button class="tab" type="button" data-tab="suppliers">Proveedores</button>
            <button class="tab" type="button" data-tab="negotiation">Negociacion</button>
            <button class="tab" type="button" data-tab="ddp">DDP</button>
            <button class="tab" type="button" data-tab="quality">Calidad</button>
          </nav>

          <div class="report active" id="brief" data-panel="brief"></div>
          <div class="report" id="tools" data-panel="tools"></div>
          <div class="report" id="suppliers" data-panel="suppliers"></div>
          <div class="report" id="negotiation" data-panel="negotiation"></div>
          <div class="report" id="ddp" data-panel="ddp"></div>
          <div class="report" id="quality" data-panel="quality"></div>
        </section>
      </main>
    </div>

    <template id="emptyState">
      <div class="empty-state">
        <div class="source-strip" aria-hidden="true">
          <span><i data-lucide="megaphone"></i> Ads</span>
          <span><i data-lucide="star"></i> Reviews</span>
          <span><i data-lucide="message-circle"></i> Social</span>
          <span><i data-lucide="package-search"></i> Alibaba</span>
        </div>
        <h2>La caja principal controla todo.</h2>
        <p>
          Si pides proveedores, el agente llama sourcing de Alibaba como herramienta interna.
        </p>
      </div>
    </template>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
